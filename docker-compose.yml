services:
  postgres_db:
    build:
      context: ./db
      dockerfile: postgres/Dockerfile
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    restart: unless-stopped
    networks:
      - alltura_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME} -h 127.0.0.1 -p 5432 || exit 1" ]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    restart: unless-stopped
    networks:
      - alltura_network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        NODE_ENV: ${NODE_ENV:-production}
    environment:
      # DB
      DB_HOST: ${DB_HOST:-postgres_db}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_PORT: ${DB_PORT:-5432}

      # Redis
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}

      # App
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-5000}
      CLIENT_URL: ${CLIENT_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
    volumes:
      - /data/coolify/secrets/gcs/service-account.json:/app/service-account.json:ro
    expose:
      - "5000"
    depends_on:
      postgres_db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - alltura_network
      - coolify
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://127.0.0.1:${PORT:-5000}/health >/dev/null || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NODE_ENV: ${NODE_ENV:-production}
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://backend:5000}
      SERVICE_FQDN_FRONTEND: ${SERVICE_FQDN_FRONTEND}
      SERVICE_URL_FRONTEND: ${SERVICE_URL_FRONTEND}
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - alltura_network
      - coolify
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://127.0.0.1:80/ >/dev/null || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
networks:
  alltura_network:
    driver: bridge
  coolify:
    external: true
volumes:
  postgres_data:
  redis_data:
