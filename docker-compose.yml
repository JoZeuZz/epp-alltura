services:
  postgres_db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    expose:
      - "5432"
    restart: unless-stopped
    networks:
      - alltura_network

  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    restart: unless-stopped
    networks:
      - alltura_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    # Evitar env_file si quieres 100% control desde Coolify; si lo mantienes, ok.
    # env_file: ./backend/.env
    environment:
      DB_HOST: postgres_db
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      # agrega aquí tus JWT secrets / GCS / etc desde Coolify
    expose:
      - "5000"
    depends_on:
      - redis
      - postgres_db
    restart: unless-stopped
    networks:
      - alltura_network
    healthcheck:
      # usa wget/curl según lo que exista en tu imagen; aquí asumo wget está disponible
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    environment:
      # OJO: esto solo sirve si tu frontend realmente lee BACKEND_URL en runtime.
      # En Vite normalmente se usa VITE_* en build-time.
      BACKEND_URL: http://backend:5000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - alltura_network
    # Use expose instead of ports - Coolify/Traefik routes via Docker network
    # DO NOT bind host ports to avoid collision with coolify-proxy on 8080
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  alltura_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
