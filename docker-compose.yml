services:
  postgres_db:
    build:
      context: ./db
      dockerfile: postgres/Dockerfile
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    restart: unless-stopped
    stop_grace_period: 30s
    mem_limit: 512m
    networks:
      - alltura_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME} -h 127.0.0.1 -p 5432 || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 40s
  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    restart: unless-stopped
    stop_grace_period: 15s
    mem_limit: 300m
    networks:
      - alltura_network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        NODE_ENV: ${NODE_ENV:-production}
    environment:
      # DB
      DB_HOST: ${DB_HOST:-postgres_db}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_PORT: ${DB_PORT:-5432}
      DB_POOL_MAX: ${DB_POOL_MAX:-20}
      DB_POOL_IDLE_MS: ${DB_POOL_IDLE_MS:-30000}
      DB_POOL_CONN_TIMEOUT_MS: ${DB_POOL_CONN_TIMEOUT_MS:-2000}
      

      # Redis
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}

      # App
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-5000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CLIENT_URL: ${CLIENT_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      SESSION_SECRET: ${SESSION_SECRET:-dev_session_secret_change_me}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}

      # Storage
      IMAGE_STORAGE_PROVIDER: ${IMAGE_STORAGE_PROVIDER:-local}
      GCS_IMAGE_PROXY: ${GCS_IMAGE_PROXY:-false}
      GCS_BUCKET_NAME: ${GCS_BUCKET_NAME:-}
      GCS_PROJECT_ID: ${GCS_PROJECT_ID:-}
      GCS_PREFIX: ${GCS_PREFIX:-}
      GCS_SIGNED_URLS: ${GCS_SIGNED_URLS:-false}
      GCS_SIGNED_URL_TTL_MS: ${GCS_SIGNED_URL_TTL_MS:-3600000}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
      IMAGE_MAX_BYTES: ${IMAGE_MAX_BYTES:-26214400}
    volumes:
      - /data/coolify/secrets/gcs/service-account-epp.json:/usr/src/app/service-account.json:ro
    expose:
      - "5000"
    depends_on:
      postgres_db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 30s
    mem_limit: 512m
    networks:
      - alltura_network
      - coolify
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://127.0.0.1:${PORT:-5000}/health/ready >/dev/null || exit 1" ]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 45s
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NODE_ENV: ${NODE_ENV:-production}
        VITE_IMAGE_MAX_MB: ${VITE_IMAGE_MAX_MB:-25}
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://backend:5000}
      SERVICE_FQDN_FRONTEND: ${SERVICE_FQDN_FRONTEND}
      SERVICE_URL_FRONTEND: ${SERVICE_URL_FRONTEND}
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped
    stop_grace_period: 30s
    mem_limit: 128m
    networks:
      - alltura_network
      - coolify
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://127.0.0.1:80/ >/dev/null || exit 1" ]
      interval: 30s
      timeout: 15s
      retries: 4
      start_period: 20s
networks:
  alltura_network:
    driver: bridge
  coolify:
    external: true
volumes:
  postgres_data:
  redis_data:
