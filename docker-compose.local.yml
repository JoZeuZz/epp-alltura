version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: alltura_backend
    env_file: ./backend/.env
    environment:
      - DB_HOST=postgres_db
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - PORT=5000
    ports:
      - "5000:5000"
    depends_on:
      - postgres_db
      - redis
    networks:
      - alltura_network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: alltura_frontend
    environment:
      - BACKEND_URL=http://backend:5000
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - alltura_network

networks:
  alltura_network:
    driver: bridge
